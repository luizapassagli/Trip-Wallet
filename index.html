<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Trip Wallet"/>
  <meta name="theme-color" content="#0e0e10"/>
  <title>Trip Wallet</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{--canvas:#0e0e10;--surface:#1b1c1f;--surface2:#23252a;--border:#3a3d44;--text:#e4e6ea;--muted:#7a7e88;--warn:#FFD23F;--danger:#E8420A;--green:#3ecf8e;--gold:#C9973A;--fd:'Space Grotesk',sans-serif;--fb:'DM Sans',sans-serif;}
    html,body{height:100%;background:var(--canvas);}
    body{color:var(--text);font-family:var(--fb);user-select:none;overscroll-behavior:none;}

    /* ── APP SHELL ── */
    .app{width:100%;max-width:480px;margin:0 auto;background:var(--canvas);display:flex;flex-direction:column;min-height:100vh;min-height:-webkit-fill-available;}
    .hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:clamp(10px,3vw,14px) clamp(12px,4vw,16px);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-top:max(clamp(10px,3vw,14px),env(safe-area-inset-top));}
    .logo-row{display:flex;align-items:center;gap:8px;}
    .logo-txt{font-family:var(--fd);font-weight:700;font-size:clamp(13px,3.5vw,15px);}
    .sw{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 10px 5px 8px;cursor:pointer;max-width:clamp(110px,38vw,160px);}
    .sw:active{opacity:.8;}
    .sw-name{font-size:clamp(10px,2.8vw,12px);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:clamp(70px,24vw,100px);}
    .sw-chev{font-size:10px;color:var(--muted);flex-shrink:0;}
    .hb{text-align:right;}
    .hb-lbl{font-size:clamp(9px,2.2vw,10px);color:var(--muted);}
    .hb-val{font-family:var(--fd);font-weight:700;font-size:clamp(15px,4.5vw,19px);line-height:1;}
    .main{overflow-y:auto;padding-bottom:calc(72px + env(safe-area-inset-bottom));flex:1;}
    .main::-webkit-scrollbar{display:none;}
    .nav{background:var(--surface);border-top:1px solid var(--border);display:flex;height:calc(clamp(56px,14vw,68px) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);position:sticky;bottom:0;}
    .nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;padding:0 2px;}
    .nb:active{opacity:.7;}
    .nb-icon{font-size:clamp(16px,4.5vw,20px);}
    .nb-lbl{font-size:clamp(9px,2.3vw,10px);font-family:var(--fb);color:var(--muted);}
    .nb.active .nb-icon{color:var(--warn);}
    .nb.active .nb-lbl{color:var(--warn);font-weight:600;}

    /* ── HELPERS ── */
    .px{padding-left:clamp(12px,4vw,16px);padding-right:clamp(12px,4vw,16px);}
    .pt{padding-top:clamp(14px,4vw,18px);}
    .gap{display:flex;flex-direction:column;gap:clamp(10px,3vw,14px);}
    .sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;color:var(--muted);margin-bottom:8px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:clamp(14px,4vw,18px);}
    .prog-t{height:10px;background:var(--border);border-radius:5px;overflow:hidden;}
    .prog-f{height:100%;border-radius:5px;transition:width .5s;}
    .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .stat-c{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:clamp(10px,3vw,12px);text-align:center;}
    .stat-v{font-family:var(--fd);font-weight:700;font-size:clamp(13px,4vw,17px);word-break:break-all;}
    .stat-l{font-size:clamp(9px,2.2vw,10px);color:var(--muted);margin-top:2px;}
    .row-card{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:clamp(10px,3vw,12px);}
    .cdot{width:clamp(32px,9vw,38px);height:clamp(32px,9vw,38px);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:clamp(15px,4vw,17px);flex-shrink:0;}
    .ri{flex:1;min-width:0;}
    .rd{font-size:clamp(12px,3.3vw,14px);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .rm{font-size:clamp(10px,2.5vw,11px);color:var(--muted);}
    .ra{font-family:var(--fd);font-weight:700;font-size:clamp(13px,3.5vw,15px);flex-shrink:0;color:var(--danger);}
    .del-btn{background:none;border:none;cursor:pointer;padding:6px;color:var(--muted);font-size:16px;flex-shrink:0;}
    .del-btn:active{color:var(--danger);}
    .amount-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:clamp(14px,4vw,18px);text-align:center;}
    .a-disp{display:flex;align-items:flex-start;justify-content:center;gap:4px;margin:4px 0 12px;}
    .a-cur{font-family:var(--fd);font-weight:700;font-size:clamp(20px,6vw,26px);color:var(--muted);margin-top:6px;}
    .a-num{font-family:var(--fd);font-weight:700;font-size:clamp(38px,12vw,52px);line-height:1;color:var(--text);}
    .note-in{width:100%;background:#111214;border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:16px;color:var(--text);font-family:var(--fb);text-align:center;outline:none;}
    .note-in::placeholder{color:var(--muted);}
    .cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(6px,2vw,8px);}
    .cat-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border-radius:12px;padding:8px 4px;cursor:pointer;border:1px solid var(--border);background:var(--surface);min-height:clamp(52px,14vw,60px);}
    .cat-btn:active{opacity:.8;}
    .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(6px,2vw,8px);}
    .key{height:clamp(44px,12vw,54px);display:flex;align-items:center;justify-content:center;border-radius:12px;font-family:var(--fd);font-size:clamp(17px,5vw,21px);font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);}
    .key:active{background:var(--surface2);}
    .key-del{background:#1f1410;color:var(--danger);}
    .save-btn{width:100%;height:clamp(48px,13vw,56px);border-radius:14px;font-family:var(--fd);font-size:clamp(14px,4vw,16px);font-weight:700;border:none;cursor:pointer;}
    .save-btn:active{opacity:.85;}
    .export-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;font-family:var(--fb);font-weight:600;font-size:clamp(12px,3.3vw,14px);cursor:pointer;min-height:48px;}
    .export-btn:active{opacity:.8;}
    .dg-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;color:var(--muted);margin-bottom:8px;}
    .empty-s{text-align:center;padding:44px 16px;color:var(--muted);font-size:14px;}
    .mini-bt{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
    .mini-bf{height:100%;border-radius:3px;transition:width .5s;}
    .reset-iw{width:72px;height:72px;border-radius:50%;background:#1f1410;border:2px solid rgba(232,66,10,.2);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;}
    .reset-conf{width:100%;display:flex;align-items:center;gap:12px;border-radius:12px;padding:14px;cursor:pointer;border:none;min-height:52px;margin-bottom:14px;}
    .chkbox{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;}
    .rab{width:100%;height:52px;border-radius:14px;font-family:var(--fd);font-weight:700;font-size:16px;border:none;cursor:pointer;}
    .rab:active{opacity:.85;}
    .modal-bg{background:rgba(0,0,0,.72);display:flex;align-items:flex-end;min-height:260px;}
    .modal-sheet{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px 18px 28px;}
    .modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .modal-title{font-family:var(--fd);font-weight:700;font-size:16px;}
    .modal-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px;padding:4px 8px;line-height:1;}
    .modal-sum{background:#111214;border:1px solid var(--border);border-radius:10px;padding:12px;font-size:12px;color:var(--muted);margin-bottom:12px;}
    .msb{width:100%;height:50px;border-radius:12px;font-family:var(--fd);font-weight:700;font-size:15px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
    .msb:active{opacity:.85;}
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--text);}
    .field input{width:100%;background:#111214;border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:16px;color:var(--text);font-family:var(--fb);outline:none;}
    .field input::placeholder{color:var(--muted);}
    .pri-btn{width:100%;height:52px;background:var(--warn);color:#0e0e10;border:none;border-radius:12px;font-family:var(--fd);font-weight:700;font-size:16px;cursor:pointer;}
    .pri-btn:active{opacity:.85;}
    .sec-btn{width:100%;height:44px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:12px;font-family:var(--fb);font-size:14px;cursor:pointer;margin-top:8px;}
    .sec-btn:active{opacity:.7;}
    .danger-btn{width:100%;height:44px;background:transparent;color:var(--danger);border:1px solid rgba(232,66,10,.4);border-radius:12px;font-family:var(--fb);font-size:14px;cursor:pointer;margin-top:8px;}
    .danger-btn:active{opacity:.7;}
    .tc{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;margin-bottom:10px;}
    .tc:active{opacity:.8;}
    .tc.tc-active{border-color:var(--warn);background:#1f1c0e;}
    .tc-info{flex:1;min-width:0;}
    .tc-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tc-sub{font-size:11px;color:var(--muted);margin-top:2px;}
    .tc-bal{font-family:var(--fd);font-weight:700;font-size:15px;flex-shrink:0;text-align:right;}
    .tc-bsub{font-size:10px;color:var(--muted);text-align:right;}
    .tc-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:17px;padding:4px 6px;flex-shrink:0;line-height:1;}
    .tc-del:active{color:var(--danger);}
    .badge{font-size:9px;background:var(--warn);color:#0e0e10;border-radius:10px;padding:2px 7px;font-weight:700;flex-shrink:0;}
    .scr{background:var(--canvas);padding-bottom:20px;min-height:100vh;}
    .scr-hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:16px clamp(12px,4vw,16px) 14px;padding-top:max(16px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;}
    .scr-title{font-family:var(--fd);font-weight:700;font-size:16px;}
    .scr-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px;padding:4px 8px;line-height:1;}
    .ob-banner{background:#2a1010;border:1px solid rgba(232,66,10,.4);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:12px;color:#E8420A;line-height:1.4;}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#23252a;border:1px solid var(--border);color:var(--text);font-size:13px;padding:10px 18px;border-radius:20px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90vw;}
    .toast.show{opacity:1;}

    /* ── SYNC DOT ── */
    .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-left:6px;flex-shrink:0;transition:background .3s;}
    .sync-dot.syncing{background:var(--warn);animation:pulse 1s infinite;}
    .sync-dot.error{background:var(--danger);}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

    /* ── LOADING ── */
    .loading-scr{position:fixed;inset:0;background:var(--canvas);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:1000;}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--warn);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ── CONFIRM DIALOG ── */
    .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;display:flex;align-items:center;justify-content:center;padding:24px;}
    .confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px 20px 20px;width:100%;max-width:340px;}
    .confirm-icon{font-size:36px;text-align:center;margin-bottom:12px;}
    .confirm-title{font-family:var(--fd);font-weight:700;font-size:17px;text-align:center;margin-bottom:8px;}
    .confirm-msg{font-size:13px;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:20px;}
    .confirm-actions{display:flex;flex-direction:column;gap:8px;}
    .confirm-danger{width:100%;height:48px;background:var(--danger);color:#fff;border:none;border-radius:12px;font-family:var(--fd);font-weight:700;font-size:15px;cursor:pointer;}
    .confirm-cancel{width:100%;height:44px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:12px;font-family:var(--fb);font-size:14px;cursor:pointer;}

    /* ── LOGIN SCREEN ── */
    .login-scr{position:fixed;inset:0;background:var(--canvas);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;padding-top:max(32px,env(safe-area-inset-top));}
    .login-logo{width:96px;height:96px;border-radius:22px;overflow:hidden;margin-bottom:20px;box-shadow:0 8px 32px rgba(0,0,0,.5);}
    .login-logo img{width:100%;height:100%;object-fit:cover;}
    .login-title{font-family:var(--fd);font-weight:700;font-size:26px;margin-bottom:6px;text-align:center;}
    .login-sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:36px;}
    .login-form{width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px;}
    .login-input-wrap{position:relative;}
    .login-input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:17px;color:var(--muted);pointer-events:none;}
    .login-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 14px 14px 44px;font-size:16px;color:var(--text);font-family:var(--fb);outline:none;transition:border-color .2s;}
    .login-input:focus{border-color:var(--warn);}
    .login-input::placeholder{color:var(--muted);}
    .login-btn{width:100%;height:54px;background:var(--warn);color:#0e0e10;border:none;border-radius:14px;font-family:var(--fd);font-weight:700;font-size:17px;cursor:pointer;margin-top:4px;transition:opacity .2s;}
    .login-btn:active{opacity:.85;}
    .login-err{font-size:13px;color:var(--danger);text-align:center;min-height:18px;}
    .login-divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px;}
    .login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .login-register-btn{width:100%;height:46px;background:transparent;color:var(--text);border:1px solid var(--border);border-radius:12px;font-family:var(--fb);font-size:14px;cursor:pointer;}
    .login-register-btn:active{opacity:.7;}
    .login-footer{font-size:11px;color:var(--muted);text-align:center;margin-top:24px;line-height:1.6;}
    .show-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px;}
  </style>
</head>
<body>

<!-- ═══ LOADING ═══ -->
<div class="loading-scr" id="loadingScr">
  <div style="font-size:48px;">✈️</div>
  <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;">Trip Wallet</div>
  <div class="spinner"></div>
  <div style="font-size:12px;color:var(--muted);" id="loadingMsg">Inicializando…</div>
</div>

<!-- ═══ TOAST ═══ -->
<div class="toast" id="toast"></div>

<!-- ═══ CONFIRM DIALOG ═══ -->
<div class="confirm-overlay" id="confirmOverlay" style="display:none;">
  <div class="confirm-box">
    <div class="confirm-icon" id="confirmIcon">⚠️</div>
    <div class="confirm-title" id="confirmTitle">Tem certeza?</div>
    <div class="confirm-msg" id="confirmMsg">Esta ação não pode ser desfeita.</div>
    <div class="confirm-actions">
      <button class="confirm-danger" id="confirmOkBtn">Confirmar</button>
      <button class="confirm-cancel" onclick="closeConfirm()">Cancelar</button>
    </div>
  </div>
</div>

<!-- ═══ LOGIN ═══ -->
<div class="login-scr" id="loginScr" style="display:none;">
  <div class="login-logo"><img src="icon.png" alt="Trip Wallet"/></div>
  <div class="login-title">Trip Wallet</div>
  <div class="login-sub" id="loginSubtitle">Controle seus gastos em viagem</div>

  <div class="login-form" id="loginFormEl">
    <div class="login-input-wrap">
      <span class="login-input-icon">✉️</span>
      <input class="login-input" type="email" id="loginEmail" placeholder="E-mail" inputmode="email" autocomplete="email"/>
    </div>
    <div class="login-input-wrap">
      <span class="login-input-icon">🔒</span>
      <input class="login-input" type="password" id="loginPassword" placeholder="Senha" autocomplete="current-password"/>
      <button class="show-pw" type="button" onclick="togglePw('loginPassword',this)">👁</button>
    </div>
    <div class="login-err" id="loginErr"></div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Entrar</button>
    <div class="login-divider">ou</div>
    <button class="login-register-btn" onclick="showRegister()">Criar conta</button>
  </div>

  <div class="login-form" id="registerFormEl" style="display:none;">
    <div class="login-input-wrap">
      <span class="login-input-icon">✉️</span>
      <input class="login-input" type="email" id="regEmail" placeholder="E-mail" inputmode="email"/>
    </div>
    <div class="login-input-wrap">
      <span class="login-input-icon">🔒</span>
      <input class="login-input" type="password" id="regPassword" placeholder="Senha (mín. 6 caracteres)"/>
      <button class="show-pw" type="button" onclick="togglePw('regPassword',this)">👁</button>
    </div>
    <div class="login-input-wrap">
      <span class="login-input-icon">🔒</span>
      <input class="login-input" type="password" id="regPassword2" placeholder="Confirmar senha"/>
      <button class="show-pw" type="button" onclick="togglePw('regPassword2',this)">👁</button>
    </div>
    <div class="login-err" id="registerErr"></div>
    <button class="login-btn" id="registerBtn" onclick="doRegister()">Criar conta</button>
    <button class="login-register-btn" onclick="showLogin()">Já tenho conta</button>
  </div>

  <div class="login-footer">Trip Wallet · Seus dados ficam seguros na nuvem ☁️</div>
</div>

<!-- ═══ APP ═══ -->
<div class="app" id="app" style="display:none;">

  <!-- LISTA DE VIAGENS -->
  <div class="scr" id="scrTrips" style="display:none;">
    <div class="scr-hdr">
      <div class="scr-title">✈️ Minhas Viagens</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="sync-dot" id="syncDotTrips"></span>
        <button onclick="doLogout()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;font-family:var(--fb);">Sair</button>
        <button class="scr-close" onclick="closeTrips()">✕</button>
      </div>
    </div>
    <div style="padding:18px clamp(12px,4vw,16px) 0;">
      <div class="sec-lbl">Suas viagens</div>
      <div id="tripList"></div>
      <button class="pri-btn" onclick="showNewTrip()">+ Nova viagem</button>
    </div>
  </div>

  <!-- NOVA VIAGEM -->
  <div class="scr" id="scrNewTrip" style="display:none;">
    <div class="scr-hdr">
      <div class="scr-title">Nova viagem</div>
      <button class="scr-close" onclick="hideNewTrip()">✕</button>
    </div>
    <div style="padding:18px clamp(12px,4vw,16px) 0;">
      <div class="field"><label>Nome da viagem</label><input type="text" id="ntName" placeholder="Ex: Lisboa – Jun 2026"/></div>

  <!-- APP PRINCIPAL -->
  <div id="mainApp" style="display:none;flex-direction:column;min-height:100vh;min-height:-webkit-fill-available;">
    <div class="hdr">
      <div class="logo-row">
        <img src="icon.png" style="width:28px;height:28px;border-radius:7px;object-fit:cover;" alt=""/>
        <div>
          <div class="logo-txt">Trip Wallet</div>
          <div style="font-size:clamp(9px,2.3vw,10px);color:var(--muted);display:flex;align-items:center;">
            <span id="hdrSubName">—</span>
            <span class="sync-dot" id="syncDotMain" style="margin-left:5px;"></span>
          </div>

      </div>

        <div class="hb">
          <div class="hb-lbl">Disponível</div>
          <div class="hb-val" id="hdrBal">$0.00</div>
        </div>
      </div>

      <button class="nb active" id="nb-home"     onclick="setTab('home')">    <span class="nb-icon">🏠</span><span class="nb-lbl">Início</span></button>

      <button class="nb"        id="nb-history"  onclick="setTab('history')"> <span class="nb-icon">🕐</span><span class="nb-lbl">Histórico</span></button>
      <button class="nb"        id="nb-summary"  onclick="setTab('summary')"> <span class="nb-icon">📊</span><span class="nb-lbl">Resumo</span></button>

    </nav>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// SUPABASE CONFIG
// ═══════════════════════════════════════════════════════
const SB_URL = 'https://fuxhpzhbhdfakyjxdwhi.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1eGhwemhiaGRmYWt5anhkd2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTc1ODUsImV4cCI6MjA5NjkzMzU4NX0.-D0uFPq44pIcx5Cfk2YaQbTOmm9Xnge0sxclBWc33Wk';

let authToken = null; // JWT do usuário logado
let currentUser = null;

async function sbFetch(path, opts={}) {
  const token = authToken || SB_KEY;
  const res = await fetch(SB_URL + '/rest/v1/' + path, {
    ...opts,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(opts.headers || {})
    }
  });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  const txt = await res.text();
  return txt ? JSON.parse(txt) : [];
}

async function sbAuth(action, body) {
  const res = await fetch(`${SB_URL}/auth/v1/${action}`, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.msg || 'Erro de autenticação');
  return data;
}

// ═══════════════════════════════════════════════════════
// DB LAYER
// ═══════════════════════════════════════════════════════
const DB = {
  async loadTrips()         { return await sbFetch('trips?select=*&order=created_at.asc'); },
  async loadExpenses(tid)   { return await sbFetch(`expenses?trip_id=eq.${tid}&select=*&order=ts.desc`); },
  async insertTrip(t)       { const r=await sbFetch('trips',{method:'POST',body:JSON.stringify(t)}); return r[0]; },
  async deleteTrip(id)      { await sbFetch(`trips?id=eq.${id}`,{method:'DELETE',headers:{'Prefer':'return=minimal'}}); },
  async insertExpense(e)    { const r=await sbFetch('expenses',{method:'POST',body:JSON.stringify(e)}); return r[0]; },
  async deleteExpense(id)   { await sbFetch(`expenses?id=eq.${id}`,{method:'DELETE',headers:{'Prefer':'return=minimal'}}); },
  async deleteAllExpenses(tid){ await sbFetch(`expenses?trip_id=eq.${tid}`,{method:'DELETE',headers:{'Prefer':'return=minimal'}}); },
};

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let trips = [], expenses = {}, activeId = null;
let tab = 'home', rIn = '0', rCat = 'food', rNote = '', pdfOpen = false, rcOk = false;

function savePref(){ try{ localStorage.setItem('tw_pref', JSON.stringify({activeId})); }catch(e){} }
function loadPref(){ try{ const p=JSON.parse(localStorage.getItem('tw_pref')||'{}'); activeId=p.activeId||null; }catch(e){} }
function saveSession(){ try{ localStorage.setItem('tw_session', JSON.stringify({token:authToken,user:currentUser})); }catch(e){} }
function loadSession(){ try{ const s=JSON.parse(localStorage.getItem('tw_session')||'null'); if(s){authToken=s.token;currentUser=s.user;} }catch(e){} }
function clearSession(){ try{ localStorage.removeItem('tw_session'); localStorage.removeItem('tw_pref'); }catch(e){} }

// ═══════════════════════════════════════════════════════
// UTIL
// ═══════════════════════════════════════════════════════
const CATS_UI=[
  {id:'food',label:'Alimentação',icon:'🍽️',color:'#FFD23F'},
  {id:'transport',label:'Transporte',icon:'🚗',color:'#3ecf8e'},
  {id:'lodging',label:'Hospedagem',icon:'🛏️',color:'#60a5fa'},
  {id:'shopping',label:'Compras',icon:'🛍️',color:'#f472b6'},
  {id:'coffee',label:'Café',icon:'☕',color:'#fb923c'},
  {id:'flights',label:'Voos',icon:'✈️',color:'#a78bfa'},
  {id:'leisure',label:'Lazer',icon:'🎟️',color:'#34d399'},
  {id:'other',label:'Outros',icon:'❓',color:'#9ca3af'},
];
const CATS_PDF={food:'#c67c00',transport:'#0a7a4a',lodging:'#1a5ca8',shopping:'#9c1a6e',coffee:'#b84e00',flights:'#5c2db8',leisure:'#0a7a5a',other:'#555'};
const gc  = id => CATS_UI.find(c=>c.id===id)||CATS_UI[CATS_UI.length-1];
const gcP = id => ({...gc(id), color:CATS_PDF[id]||'#555'});
const fmt = n => (n<0?'-':'')+'$'+Math.abs(n).toFixed(2);
function balColor(a,b){ return (a<0||a/b<0.20)?'#E8420A':'#FFD23F'; }
function gColor(p){ return p>=100?'#E8420A':p>70?'#FFD23F':'#ffffff'; }
function fmtD(ts){
  const d=new Date(ts),n=new Date();
  if(d.toDateString()===n.toDateString())return'Hoje';
  if(d.toDateString()===new Date(n-86400000).toDateString())return'Ontem';
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
}
function grp(exps){ const g={}; [...exps].sort((a,b)=>b.ts-a.ts).forEach(e=>{const k=fmtD(e.ts);if(!g[k])g[k]=[];g[k].push(e);}); return g; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function showToast(msg,dur=2400){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),dur); }
function setSyncing(s){ document.querySelectorAll('.sync-dot').forEach(d=>{ d.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':''); }); }
function activeTrip(){ return trips.find(t=>t.id===activeId)||null; }
function activeExps(){ return expenses[activeId]||[]; }

// ═══════════════════════════════════════════════════════
// CONFIRM DIALOG
// ═══════════════════════════════════════════════════════
let confirmResolve = null;
function showConfirm(icon, title, msg, btnLabel='Excluir'){
  return new Promise(resolve => {
    confirmResolve = resolve;
    document.getElementById('confirmIcon').textContent = icon;
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMsg').textContent = msg;
    document.getElementById('confirmOkBtn').textContent = btnLabel;
    document.getElementById('confirmOverlay').style.display = 'flex';
  });
}
function closeConfirm(result=false){
  document.getElementById('confirmOverlay').style.display = 'none';
  if(confirmResolve){ confirmResolve(result); confirmResolve=null; }
}
document.getElementById('confirmOkBtn').onclick = () => closeConfirm(true);

// ═══════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════
function togglePw(id, btn){
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.textContent = show ? '🙈' : '👁';
}
function showLogin(){
  document.getElementById('loginFormEl').style.display = 'flex';
  document.getElementById('registerFormEl').style.display = 'none';
  document.getElementById('loginSubtitle').textContent = 'Controle seus gastos em viagem';
  document.getElementById('loginErr').textContent = '';
}
function showRegister(){
  document.getElementById('loginFormEl').style.display = 'none';
  document.getElementById('registerFormEl').style.display = 'flex';
  document.getElementById('loginSubtitle').textContent = 'Crie sua conta gratuita';
  document.getElementById('registerErr').textContent = '';
}
async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');
  if(!email||!password){ errEl.textContent='Preencha e-mail e senha.'; return; }
  btn.textContent='Entrando…'; btn.disabled=true; errEl.textContent='';
  try {
    const data = await sbAuth('token?grant_type=password', {email, password});
    authToken = data.access_token;
    currentUser = data.user;
    saveSession();
    await loadApp();
  } catch(e){
    errEl.textContent = e.message.includes('Invalid')||e.message.includes('invalid') ? 'E-mail ou senha incorretos.' : e.message;
  } finally { btn.textContent='Entrar'; btn.disabled=false; }
}
async function doRegister(){
  const email = document.getElementById('regEmail').value.trim();
  const pw1 = document.getElementById('regPassword').value;
  const pw2 = document.getElementById('regPassword2').value;
  const errEl = document.getElementById('registerErr');
  const btn = document.getElementById('registerBtn');
  if(!email||!pw1){ errEl.textContent='Preencha todos os campos.'; return; }
  if(pw1.length<6){ errEl.textContent='A senha deve ter pelo menos 6 caracteres.'; return; }
  if(pw1!==pw2){ errEl.textContent='As senhas não coincidem.'; return; }
  btn.textContent='Criando conta…'; btn.disabled=true; errEl.textContent='';
  try {
    const data = await sbAuth('signup', {email, password:pw1});
    authToken = data.access_token;
    currentUser = data.user;
    saveSession();
    await loadApp();
    showToast('✅ Conta criada com sucesso!');
  } catch(e){
    errEl.textContent = e.message.includes('already')? 'Este e-mail já está cadastrado.' : e.message;
  } finally { btn.textContent='Criar conta'; btn.disabled=false; }
}
function doLogout(){
  clearSession(); authToken=null; currentUser=null;
  trips=[]; expenses={}; activeId=null;
  document.getElementById('app').style.display='none';
  document.getElementById('loginScr').style.display='flex';
  showLogin();
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
async function init(){
  loadSession();
  if(authToken){
    try { await loadApp(); }
    catch(e){ showLoginScreen(); }
  } else {
    showLoginScreen();
  }
}
function showLoginScreen(){
  document.getElementById('loadingScr').style.display='none';
  document.getElementById('loginScr').style.display='flex';
  showLogin();
}
async function loadApp(){
  loadPref();
  document.getElementById('loadingScr').style.display='flex';
  document.getElementById('loadingMsg').textContent='Carregando viagens…';
  document.getElementById('loginScr').style.display='none';
  try {
    trips = await DB.loadTrips();
    if(activeId && trips.find(t=>t.id===activeId)){
      document.getElementById('loadingMsg').textContent='Carregando gastos…';
      expenses[activeId] = await DB.loadExpenses(activeId);
    } else {
      activeId = trips.length ? trips[0].id : null;
      if(activeId) expenses[activeId] = await DB.loadExpenses(activeId);
      savePref();
    }
    document.getElementById('loadingScr').style.display='none';
    document.getElementById('app').style.display='block';
    if(trips.length===0){ showNewTripFirst(); } else { showMain(); renderAll(); }
  } catch(e){
    document.getElementById('loadingMsg').textContent='❌ Erro ao conectar. Verifique a internet.';
    console.error(e);
  }
}

// ═══════════════════════════════════════════════════════
// NAVEGAÇÃO
// ═══════════════════════════════════════════════════════
function showMain(){
  ['scrTrips','scrNewTrip'].forEach(id=>document.getElementById(id).style.display='none');
  const m=document.getElementById('mainApp'); m.style.display='flex'; m.style.flexDirection='column';
}
function showNewTripFirst(){
  // Primeira viagem: mostra form sem botão cancelar
  document.getElementById('scrNewTrip').style.display='block';
  document.getElementById('cancelNewTripBtn').style.display='none';
}
async function openTrips(){
  document.getElementById('mainApp').style.display='none';
  document.getElementById('scrNewTrip').style.display='none';
  document.getElementById('scrTrips').style.display='block';
  renderTripList();
}
function closeTrips(){ if(activeTrip()) showMain(); }
function showNewTrip(){
  document.getElementById('scrTrips').style.display='none';
  document.getElementById('scrNewTrip').style.display='block';
  document.getElementById('cancelNewTripBtn').style.display='block';
  ['ntName','ntBudget','ntDays'].forEach(id=>document.getElementById(id).value='');
}
function hideNewTrip(){
  document.getElementById('scrNewTrip').style.display='none';
  document.getElementById('scrTrips').style.display='block';
  renderTripList();
}
async function setActive(id){
  activeId=id; savePref();
  rIn='0';rNote='';rCat='food';tab='home';pdfOpen=false;rcOk=false;
  if(!expenses[id]){
    setSyncing('syncing');
    try{ expenses[id]=await DB.loadExpenses(id); setSyncing(''); }
    catch(e){ setSyncing('error'); showToast('⚠ Erro ao carregar gastos'); }
  }
  renderAll(); showMain();
}

// ═══════════════════════════════════════════════════════
// TRIP CRUD
// ═══════════════════════════════════════════════════════
async function createTrip(){
  const name=document.getElementById('ntName').value.trim();
  const budget=parseFloat(document.getElementById('ntBudget').value);
  const days=parseInt(document.getElementById('ntDays').value)||14;
  if(!name||isNaN(budget)||budget<=0){ showToast('⚠ Preencha nome e orçamento'); return; }
  const btn=document.getElementById('createTripBtn');
  btn.textContent='Salvando…'; btn.disabled=true; setSyncing('syncing');
  try {
    const now=Date.now();
    const t={id:uid(),name,budget,days,created_at:now,updated_at:now,user_id:currentUser.id};
    await DB.insertTrip(t);
    trips.push(t); expenses[t.id]=[];
    activeId=t.id; savePref();
    setSyncing(''); showToast('✅ Viagem criada!');
    tab='home'; renderAll(); showMain();
  } catch(e){ setSyncing('error'); showToast('❌ Erro ao salvar viagem'); console.error(e); }
  finally{ btn.textContent='Criar viagem'; btn.disabled=false; }
}

async function deleteTrip(id, e){
  e.stopPropagation();
  const trip = trips.find(t=>t.id===id);
  if(!trip) return;
  const ok = await showConfirm('🗑️','Apagar viagem?',`"${trip.name}" e todos os gastos serão removidos permanentemente.`,'Apagar viagem');
  if(!ok) return;
  setSyncing('syncing');
  try {
    await DB.deleteTrip(id);
    trips=trips.filter(t=>t.id!==id);
    delete expenses[id];
    if(activeId===id){
      activeId=trips.length ? trips[0].id : null;
      savePref();
      if(activeId && !expenses[activeId]) expenses[activeId]=await DB.loadExpenses(activeId);
    }
    setSyncing('');
    if(trips.length===0){ showNewTripFirst(); }
    else if(document.getElementById('scrTrips').style.display!=='none'){ renderTripList(); }
    else{ renderAll(); }
    showToast('🗑 Viagem apagada');
  } catch(e){ setSyncing('error'); showToast('❌ Erro ao apagar viagem'); }
}

// ═══════════════════════════════════════════════════════
// EXPENSE CRUD
// ═══════════════════════════════════════════════════════
async function saveExp(){
  const amount=parseFloat(rIn); if(!amount||amount<=0) return;
  const note=document.getElementById('rnote')?.value.trim()||gc(rCat).label;
  const btn=document.getElementById('sbtn');
  btn.textContent='Salvando…'; btn.disabled=true; setSyncing('syncing');
  try {
    const exp={id:uid(),trip_id:activeId,amount,category:rCat,note,ts:Date.now(),created_at:Date.now(),user_id:currentUser.id};
    await DB.insertExpense(exp);
    if(!expenses[activeId]) expenses[activeId]=[];
    expenses[activeId].unshift(exp);
    rIn='0'; rNote=''; tab='home';
    setSyncing(''); showToast('✅ Gasto registrado!'); renderAll();
  } catch(err){ setSyncing('error'); showToast('❌ Erro ao salvar gasto'); btn.textContent='Registrar'; btn.disabled=false; }
}

async function delExp(id){
  const exp = activeExps().find(e=>e.id===id);
  if(!exp) return;
  const ok = await showConfirm('🗑️','Remover gasto?',`"${exp.note}" — $${parseFloat(exp.amount).toFixed(2)} será removido permanentemente.`,'Remover');
  if(!ok) return;
  setSyncing('syncing');
  try {
    await DB.deleteExpense(id);
    expenses[activeId]=expenses[activeId].filter(e=>e.id!==id);
    setSyncing(''); showToast('🗑 Gasto removido'); renderAll();
  } catch(e){ setSyncing('error'); showToast('❌ Erro ao remover'); }
}

async function doReset(){
  const t=activeTrip(); if(!t||!rcOk) return;
  const ok = await showConfirm('⚠️','Resetar viagem?',`Todos os ${activeExps().length} gastos de "${t.name}" serão apagados permanentemente.`,'Resetar tudo');
  if(!ok){ rcOk=false; renderTab('reset'); return; }
  setSyncing('syncing');
  try {
    await DB.deleteAllExpenses(activeId);
    expenses[activeId]=[]; rcOk=false; tab='home';
    setSyncing(''); showToast('✅ Gastos apagados'); renderAll();
  } catch(e){ setSyncing('error'); showToast('❌ Erro ao resetar'); }
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function renderAll(){
  const t=activeTrip(); if(!t) return;
  const exps=activeExps();
  const spent=exps.reduce((a,e)=>a+parseFloat(e.amount),0);
  const avail=t.budget-spent;
  document.getElementById('hdrSubName').textContent=t.name;
  document.getElementById('swName').textContent=t.name;
  const hb=document.getElementById('hdrBal');
  hb.textContent=fmt(avail); hb.style.color=balColor(avail,t.budget);
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nb-'+tab); if(nb)nb.classList.add('active');
  renderTab(tab);
}
function setTab(t){ tab=t; renderAll(); }
function renderTab(t){
  const c=document.getElementById('mainContent'); if(!c) return;
  if(t==='home')c.innerHTML=rHome();
  else if(t==='register')c.innerHTML=rRegister();
  else if(t==='history')c.innerHTML=rHistory();
  else if(t==='summary')c.innerHTML=rSummary();
  else if(t==='reset')c.innerHTML=rReset();
}

function renderTripList(){
  const el=document.getElementById('tripList'); if(!el) return;
  if(!trips.length){ el.innerHTML=`<div class="empty-s">Nenhuma viagem ainda</div>`; return; }
  el.innerHTML=trips.map(t=>{
    const exps=expenses[t.id]||[];
    const spent=exps.reduce((a,e)=>a+parseFloat(e.amount),0);
    const avail=t.budget-spent; const isA=t.id===activeId;
    return`<div class="tc${isA?' tc-active':''}" onclick="setActive('${t.id}')">
      <span style="font-size:22px;">✈️</span>
      <div class="tc-info">
        <div class="tc-name">${t.name}</div>
        <div class="tc-sub">${exps.length} gasto${exps.length!==1?'s':''} · ${t.days} dias</div>
      </div>
      <div style="text-align:right;">
        <div class="tc-bal" style="color:${balColor(avail,t.budget)};">${fmt(avail)}</div>
        <div class="tc-bsub">de $${parseFloat(t.budget).toFixed(2)}</div>
      </div>
      ${isA?'<span class="badge">ATIVA</span>':''}
      <button class="tc-del" onclick="deleteTrip('${t.id}',event)" title="Apagar viagem">🗑️</button>
    </div>`;
  }).join('');
}

function rHome(){
  const t=activeTrip(); const exps=activeExps();
  const spent=exps.reduce((a,e)=>a+parseFloat(e.amount),0);
  const avail=t.budget-spent; const over=avail<0;
  const pct=t.budget>0?Math.min((spent/t.budget)*100,100):0;
  const clr=gColor(pct);
  const recent=[...exps].sort((a,b)=>b.ts-a.ts).slice(0,5);
  return`<div class="px pt gap">
    ${over?`<div class="ob-banner"><span style="font-size:18px;flex-shrink:0;">⚠️</span><span>Orçamento estourado! Você gastou <strong>${fmt(Math.abs(avail))}</strong> acima do limite.</span></div>`:''}
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;">
        <span style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);">Saldo Restante</span>
        <span style="font-size:11px;color:${over?'#E8420A':'var(--muted)'};">${over?'⚠ Acima do orçamento':pct.toFixed(1)+'% usado'}</span>
      </div>
      <div style="font-family:var(--fd);font-weight:700;font-size:clamp(34px,10vw,44px);line-height:1.1;margin:2px 0 14px;color:${over?'#E8420A':'var(--text)'};">${fmt(avail)}</div>
      <div class="prog-t"><div class="prog-f" style="width:${pct}%;background:${clr};"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:10px;">
        <div><div style="font-size:11px;color:var(--muted);">Gasto</div><div style="font-family:var(--fd);font-weight:600;font-size:14px;color:${clr};">$${spent.toFixed(2)}</div></div>
        <div style="text-align:right;"><div style="font-size:11px;color:var(--muted);">Orçamento</div><div style="font-family:var(--fd);font-weight:600;font-size:14px;">$${parseFloat(t.budget).toFixed(2)}</div></div>
      </div>
    </div>
    <div class="stat-grid">
      <div class="stat-c"><div class="stat-v">${t.days}</div><div class="stat-l">Dias</div></div>
      <div class="stat-c"><div class="stat-v" style="color:${over?'#E8420A':'var(--text)'};">$${spent.toFixed(2)}</div><div class="stat-l">Total gasto</div></div>
      <div class="stat-c"><div class="stat-v">${exps.length}</div><div class="stat-l">Lançamentos</div></div>
    </div>
    ${recent.length
      ?`<div><div class="sec-lbl">Recentes</div><div style="display:flex;flex-direction:column;gap:8px;">
        ${recent.map(e=>{const cat=gc(e.category);return`<div class="row-card">
          <div class="cdot" style="background:${cat.color}22;color:${cat.color};">${cat.icon}</div>
          <div class="ri"><div class="rd">${e.note}</div><div class="rm">${new Date(e.ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})} · ${cat.label}</div></div>
          <div class="ra">-$${parseFloat(e.amount).toFixed(2)}</div>
        </div>`;}).join('')}</div></div>`
      :`<div class="empty-s"><div style="font-size:36px;margin-bottom:10px;">🧾</div>Nenhum gasto ainda.<br>Toque em <strong>Adicionar</strong> para começar.</div>`}
  </div>`;
}

function rRegister(){
  const cat=gc(rCat); const val=parseFloat(rIn)||0;
  return`<div class="px pt gap">
    <div class="amount-card">
      <div class="sec-lbl" style="text-align:center;">Valor</div>
      <div class="a-disp"><span class="a-cur">$</span><span class="a-num" id="anum">${rIn}</span></div>
      <input class="note-in" id="rnote" placeholder="Observação (opcional)" value="${rNote}" oninput="rNote=this.value" maxlength="40"/>
    </div>
    <div><div class="sec-lbl">Categoria</div>
    <div class="cat-grid">${CATS_UI.map(c=>{const s=c.id===rCat;return`<button class="cat-btn" onclick="selCat('${c.id}')" style="${s?`background:${c.color}22;border-color:${c.color};`:''}">
      <span style="font-size:clamp(15px,4.5vw,18px);">${c.icon}</span>
      <span style="font-size:clamp(9px,2.3vw,10px);font-family:var(--fb);color:${s?c.color:'var(--muted)'};">${c.label}</span>
    </button>`;}).join('')}</div></div>
    <div class="keypad">${['1','2','3','4','5','6','7','8','9','.','0','DEL'].map(k=>`<button class="key${k==='DEL'?' key-del':''}" onclick="kp('${k}')">${k==='DEL'?'⌫':k}</button>`).join('')}</div>
    <button class="save-btn" id="sbtn" onclick="saveExp()" style="background:${val>0?cat.color:'var(--border)'};color:#0e0e10;opacity:${val>0?1:0.4};" ${val<=0?'disabled':''}>Registrar ${val>0?'$'+val.toFixed(2):''}</button>
  </div>`;
}

function rHistory(){
  const exps=activeExps(); const t=activeTrip();
  const grouped=grp(exps); const keys=Object.keys(grouped);
  const total=exps.reduce((a,e)=>a+parseFloat(e.amount),0);
  return`<div class="px pt gap">
    <button class="export-btn" onclick="openPdfModal()" style="color:#60a5fa;border-color:#60a5fa;"><span>📄</span> Exportar como PDF</button>
    ${keys.length===0?`<div class="empty-s"><div style="font-size:36px;margin-bottom:10px;">🕐</div>Nenhum gasto registrado ainda</div>`:''}
    ${keys.map(dk=>`<div><div class="dg-lbl">${dk}</div><div style="display:flex;flex-direction:column;gap:7px;">
      ${grouped[dk].map(e=>{const cat=gc(e.category);return`<div class="row-card">
        <div class="cdot" style="background:${cat.color}22;color:${cat.color};">${cat.icon}</div>
        <div class="ri"><div class="rd">${e.note}</div><div class="rm">${new Date(e.ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})} · ${cat.label}</div></div>
        <div class="ra">-$${parseFloat(e.amount).toFixed(2)}</div>
        <button class="del-btn" onclick="delExp('${e.id}')">🗑️</button>
      </div>`;}).join('')}</div></div>`).join('')}
    ${pdfOpen?`<div class="modal-bg"><div class="modal-sheet">
      <div class="modal-hdr"><span class="modal-title">📄 Exportar PDF</span><button class="modal-close" onclick="closePdf()">✕</button></div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:12px;">Gera um relatório completo da viagem.</p>
      <div class="modal-sum"><strong>${exps.length}</strong> despesa${exps.length!==1?'s':''} · Total: <strong>$${total.toFixed(2)}</strong><br><span>Viagem: ${t.name}</span></div>
      <button class="msb" onclick="gerarPDF()" style="background:#60a5fa;color:#0e0e10;">📄 Gerar PDF</button>
    </div></div>`:''}
  </div>`;
}

function rSummary(){
  const exps=activeExps(); const t=activeTrip();
  const total=exps.reduce((a,e)=>a+parseFloat(e.amount),0);
  const avail=t.budget-total; const over=avail<0;
  const cats=CATS_UI.map(c=>({...c,total:exps.filter(e=>e.category===c.id).reduce((a,e)=>a+parseFloat(e.amount),0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  return`<div class="px pt gap">
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;">
      <div><div class="sec-lbl">Total Gasto</div><div style="font-family:var(--fd);font-weight:700;font-size:clamp(24px,7vw,30px);color:${over?'#E8420A':'var(--text)'};">$${total.toFixed(2)}</div></div>
      <div style="text-align:right;"><div class="sec-lbl">Saldo</div><div style="font-family:var(--fd);font-size:clamp(16px,5vw,20px);color:${balColor(avail,t.budget)};">${fmt(avail)}</div></div>
    </div>
    <div class="sec-lbl">Por categoria</div>
    ${cats.length===0?`<div class="empty-s"><div style="font-size:36px;margin-bottom:10px;">📊</div>Sem dados ainda</div>`
    :cats.map(cat=>{const pct=total>0?(cat.total/total)*100:0;const bp=(cat.total/t.budget)*100;
      return`<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="cdot" style="width:34px;height:34px;font-size:16px;background:${cat.color}22;color:${cat.color};">${cat.icon}</div>
            <span style="font-size:clamp(12px,3.3vw,14px);font-weight:500;">${cat.label}</span>
          </div>
          <div style="text-align:right;">
            <div style="font-family:var(--fd);font-weight:700;font-size:clamp(13px,3.5vw,15px);color:${cat.color};">$${cat.total.toFixed(2)}</div>
            <div style="font-size:11px;color:var(--muted);">${pct.toFixed(1)}% do total</div>
          </div>
        </div>
        <div class="mini-bt"><div class="mini-bf" style="width:${Math.min(bp,100)}%;background:${cat.color};"></div></div>
      </div>`;}).join('')}
    <div style="height:8px;"></div>
  </div>`;
}

function rReset(){
  const t=activeTrip(); const exps=activeExps();
  const total=exps.reduce((a,e)=>a+parseFloat(e.amount),0);
  const pct=t.budget>0?Math.min((total/t.budget)*100,100):0;
  return`<div class="px pt">
    <div class="reset-iw">🔄</div>
    <div style="font-family:var(--fd);font-weight:700;font-size:clamp(17px,5vw,20px);text-align:center;margin-bottom:8px;">Resetar Viagem</div>
    <div style="font-size:clamp(12px,3.3vw,13px);color:var(--muted);text-align:center;line-height:1.6;margin-bottom:20px;">Apaga todos os gastos de <strong style="color:var(--text);">"${t.name}"</strong>. Não pode ser desfeito.</div>
    <div class="card" style="margin-bottom:14px;">
      <div class="sec-lbl">Dados atuais</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><span style="font-size:13px;color:var(--muted);">Despesas registradas</span><span style="font-family:var(--fd);font-weight:700;">${exps.length}</span></div>
      <div style="display:flex;justify-content:space-between;align-items:center;"><span style="font-size:13px;color:var(--muted);">Total gasto</span><span style="font-family:var(--fd);font-weight:700;color:#E8420A;">$${total.toFixed(2)}</span></div>
      <div class="mini-bt" style="margin-top:10px;"><div class="mini-bf" style="width:${pct}%;background:#E8420A;"></div></div>
    </div>
    <div style="background:#1f1410;border:1px solid rgba(232,66,10,.3);border-radius:12px;padding:12px 14px;display:flex;gap:10px;margin-bottom:16px;">
      <span style="font-size:17px;flex-shrink:0;">⚠️</span>
      <p style="font-size:12px;color:#E8420A;line-height:1.5;">Todos os lançamentos serão removidos permanentemente do banco de dados. Exporte o PDF antes se quiser guardar.</p>
    </div>
    <button class="reset-conf" onclick="toggleRC()" style="background:${rcOk?'#1a2a1a':'var(--surface)'};border:${rcOk?'1.5px solid #3ecf8e':'1px solid var(--border)'};">
      <div class="chkbox" style="background:${rcOk?'#3ecf8e':'transparent'};border:2px solid ${rcOk?'#3ecf8e':'var(--border)'};">${rcOk?'✓':''}</div>
      <span style="font-size:clamp(12px,3.3vw,13px);color:${rcOk?'#3ecf8e':'var(--muted)'};">Entendo que esta ação é irreversível</span>
    </button>
    <button class="rab" onclick="doReset()" style="background:${rcOk?'#E8420A':'var(--border)'};color:${rcOk?'#fff':'var(--muted)'};opacity:${rcOk?1:0.5};" ${rcOk?'':'disabled'}>Resetar todos os gastos</button>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// KEYPAD & PDF
// ═══════════════════════════════════════════════════════
function selCat(id){ rCat=id; renderTab('register'); }
function kp(k){
  if(k==='DEL'){ rIn=rIn.length<=1?'0':rIn.slice(0,-1); }
  else if(k==='.'){ if(!rIn.includes('.')) rIn+='.'; }
  else{ if(rIn==='0') rIn=k; else if(rIn.replace('.','').length<7) rIn+=k; }
  const n=document.getElementById('anum'); if(n) n.textContent=rIn;
  const b=document.getElementById('sbtn'); const cat=gc(rCat); const v=parseFloat(rIn)||0;
  if(b){ b.textContent='Registrar '+(v>0?'$'+v.toFixed(2):''); b.style.background=v>0?cat.color:'var(--border)'; b.style.opacity=v>0?1:0.4; b.disabled=v<=0; }
}
function openPdfModal(){ pdfOpen=true; renderTab('history'); }
function closePdf(){ pdfOpen=false; renderTab('history'); }
function toggleRC(){ rcOk=!rcOk; renderTab('reset'); }

function gerarPDF(){
  const t=activeTrip(); const exps=activeExps(); if(!t) return;
  const total=exps.reduce((a,e)=>a+parseFloat(e.amount),0);
  const avail=t.budget-total; const over=avail<0;
  const grouped=grp(exps);
  const catTotals=CATS_UI.map(c=>({...gcP(c.id),total:exps.filter(e=>e.category===c.id).reduce((a,e)=>a+parseFloat(e.amount),0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  const dateStr=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
  let rows='';
  Object.keys(grouped).forEach(dk=>{
    rows+=`<tr style="background:#f0f4f8;"><td colspan="3" style="padding:6px 10px;font-weight:700;font-size:12px;color:#333;border-bottom:1px solid #e0e0e0;">${dk}</td></tr>`;
    grouped[dk].forEach(e=>{
      const cat=gcP(e.category);
      rows+=`<tr><td style="padding:7px 10px;font-size:13px;">${cat.icon} ${e.note}</td><td style="padding:7px 10px;font-size:11px;color:#777;">${cat.label} · ${new Date(e.ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</td><td style="padding:7px 10px;font-size:13px;font-weight:600;text-align:right;color:#c00;">-$${parseFloat(e.amount).toFixed(2)}</td></tr>`;
    });
  });
  let catRows=catTotals.map(c=>{const pct=total>0?((c.total/total)*100).toFixed(1):0;return`<tr><td style="padding:6px 10px;font-size:12px;">${c.icon} ${c.label}</td><td style="padding:6px 10px;font-size:13px;font-weight:700;text-align:right;color:${c.color};">$${c.total.toFixed(2)}</td><td style="padding:6px 10px;font-size:11px;color:#888;text-align:right;">${pct}%</td></tr>`;}).join('');
  const html=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Trip Wallet – ${t.name}</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:Arial,sans-serif;background:#fff;color:#111;padding:32px;}h1{font-size:22px;font-weight:700;margin-bottom:3px;}.sub{font-size:13px;color:#888;margin-bottom:24px;}.cards{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap;}.card{flex:1;min-width:100px;border:1px solid #ddd;border-radius:8px;padding:14px;}.card-lbl{font-size:10px;text-transform:uppercase;color:#888;margin-bottom:4px;}.card-val{font-size:20px;font-weight:700;}table{width:100%;border-collapse:collapse;margin-bottom:28px;}th{text-align:left;font-size:10px;text-transform:uppercase;color:#999;padding:7px 10px;border-bottom:2px solid #eee;}tr:nth-child(even) td{background:#fafafa;}.footer{font-size:11px;color:#bbb;text-align:center;border-top:1px solid #eee;padding-top:12px;}@media print{body{padding:16px;}@page{margin:1cm;size:A4;}}</style></head><body>
  <h1>✈️ Trip Wallet</h1><div class="sub">${t.name} · ${dateStr}</div>
  <div class="cards"><div class="card"><div class="card-lbl">Orçamento</div><div class="card-val">$${parseFloat(t.budget).toFixed(2)}</div></div><div class="card"><div class="card-lbl">Total gasto</div><div class="card-val" style="color:#c00;">$${total.toFixed(2)}</div></div><div class="card"><div class="card-lbl">Saldo restante</div><div class="card-val" style="color:${over?'#c00':'#0a7a4a'};">${fmt(avail)}</div></div></div>
  <table><thead><tr><th>Descrição</th><th>Categoria · Hora</th><th style="text-align:right;">Valor</th></tr></thead><tbody>${rows||'<tr><td colspan="3" style="padding:20px;text-align:center;color:#aaa;">Nenhum gasto</td></tr>'}</tbody></table>
  ${catTotals.length?`<table><thead><tr><th>Categoria</th><th style="text-align:right;">Total</th><th style="text-align:right;">%</th></tr></thead><tbody>${catRows}</tbody></table>`:''}
  <div class="footer">Trip Wallet · ${exps.length} lançamento${exps.length!==1?'s':''} · ${t.days} dias</div></body></html>`;
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const win=window.open(url,'_blank');
  if(win){ setTimeout(()=>win.print(),700); } else { showToast('⚠ Permita pop-ups para gerar o PDF'); }
  closePdf();
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));

init();
</script>
</body>
