<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Trip Wallet"/>
  <meta name="theme-color" content="#0e0e10"/>
  <title>Trip Wallet</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{--canvas:#0e0e10;--surface:#1b1c1f;--surface2:#23252a;--border:#3a3d44;--text:#e4e6ea;--muted:#7a7e88;--warn:#FFD23F;--danger:#E8420A;--green:#3ecf8e;--fd:'Space Grotesk',sans-serif;--fb:'DM Sans',sans-serif;}
    html,body{height:100%;background:var(--canvas);}
    body{color:var(--text);font-family:var(--fb);user-select:none;overscroll-behavior:none;}
    .app{width:100%;max-width:480px;margin:0 auto;background:var(--canvas);display:flex;flex-direction:column;min-height:100vh;min-height:-webkit-fill-available;}
    .hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:clamp(10px,3vw,14px) clamp(12px,4vw,16px);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-top:max(clamp(10px,3vw,14px),env(safe-area-inset-top));}
    .logo-row{display:flex;align-items:center;gap:8px;}
    .logo-txt{font-family:var(--fd);font-weight:700;font-size:clamp(13px,3.5vw,15px);}
    .sw{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 10px 5px 8px;cursor:pointer;max-width:clamp(110px,38vw,160px);}
    .sw:active{opacity:.8;}
    .sw-name{font-size:clamp(10px,2.8vw,12px);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:clamp(70px,24vw,100px);}
    .sw-chev{font-size:10px;color:var(--muted);flex-shrink:0;}
    .hb{text-align:right;}
    .hb-lbl{font-size:clamp(9px,2.2vw,10px);color:var(--muted);}
    .hb-val{font-family:var(--fd);font-weight:700;font-size:clamp(15px,4.5vw,19px);line-height:1;}
    .main{overflow-y:auto;padding-bottom:calc(72px + env(safe-area-inset-bottom));flex:1;}
    .main::-webkit-scrollbar{display:none;}
    .nav{background:var(--surface);border-top:1px solid var(--border);display:flex;height:calc(clamp(56px,14vw,68px) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);position:sticky;bottom:0;}
    .nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;padding:0 2px;}
    .nb:active{opacity:.7;}
    .nb-icon{font-size:clamp(16px,4.5vw,20px);}
    .nb-lbl{font-size:clamp(9px,2.3vw,10px);font-family:var(--fb);color:var(--muted);}
    .nb.active .nb-icon{color:var(--warn);}
    .nb.active .nb-lbl{color:var(--warn);font-weight:600;}
    .px{padding-left:clamp(12px,4vw,16px);padding-right:clamp(12px,4vw,16px);}
    .pt{padding-top:clamp(14px,4vw,18px);}
    .gap{display:flex;flex-direction:column;gap:clamp(10px,3vw,14px);}
    .sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;color:var(--muted);margin-bottom:8px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:clamp(14px,4vw,18px);}
    .prog-t{height:10px;background:var(--border);border-radius:5px;overflow:hidden;}
    .prog-f{height:100%;border-radius:5px;transition:width .5s;}
    .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .stat-c{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:clamp(10px,3vw,12px);text-align:center;}
    .stat-v{font-family:var(--fd);font-weight:700;font-size:clamp(13px,4vw,17px);word-break:break-all;}
    .stat-l{font-size:clamp(9px,2.2vw,10px);color:var(--muted);margin-top:2px;}
    .row-card{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:clamp(10px,3vw,12px);}
    .cdot{width:clamp(32px,9vw,38px);height:clamp(32px,9vw,38px);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:clamp(15px,4vw,17px);flex-shrink:0;}
    .ri{flex:1;min-width:0;}
    .rd{font-size:clamp(12px,3.3vw,14px);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .rm{font-size:clamp(10px,2.5vw,11px);color:var(--muted);}
    .ra{font-family:var(--fd);font-weight:700;font-size:clamp(13px,3.5vw,15px);flex-shrink:0;color:var(--danger);}
    .del-btn{background:none;border:none;cursor:pointer;padding:6px;color:var(--muted);font-size:16px;flex-shrink:0;}
    .del-btn:active{color:var(--danger);}
    .amount-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:clamp(14px,4vw,18px);text-align:center;}
    .a-disp{display:flex;align-items:flex-start;justify-content:center;gap:4px;margin:4px 0 12px;}
    .a-cur{font-family:var(--fd);font-weight:700;font-size:clamp(20px,6vw,26px);color:var(--muted);margin-top:6px;}
    .a-num{font-family:var(--fd);font-weight:700;font-size:clamp(38px,12vw,52px);line-height:1;color:var(--text);}
    .note-in{width:100%;background:#111214;border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:16px;color:var(--text);font-family:var(--fb);text-align:center;outline:none;}
    .note-in::placeholder{color:var(--muted);}
    .cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(6px,2vw,8px);}
    .cat-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border-radius:12px;padding:8px 4px;cursor:pointer;border:1px solid var(--border);background:var(--surface);min-height:clamp(52px,14vw,60px);}
    .cat-btn:active{opacity:.8;}
    .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(6px,2vw,8px);}
    .key{height:clamp(44px,12vw,54px);display:flex;align-items:center;justify-content:center;border-radius:12px;font-family:var(--fd);font-size:clamp(17px,5vw,21px);font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);}
    .key:active{background:var(--surface2);}
    .key-del{background:#1f1410;color:var(--danger);}
    .save-btn{width:100%;height:clamp(48px,13vw,56px);border-radius:14px;font-family:var(--fd);font-size:clamp(14px,4vw,16px);font-weight:700;border:none;cursor:pointer;}
    .save-btn:active{opacity:.85;}
    .export-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;font-family:var(--fb);font-weight:600;font-size:clamp(12px,3.3vw,14px);cursor:pointer;min-height:48px;}
    .export-btn:active{opacity:.8;}
    .dg-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;color:var(--muted);margin-bottom:8px;}
    .empty-s{text-align:center;padding:44px 16px;color:var(--muted);font-size:14px;}
    .mini-bt{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
    .mini-bf{height:100%;border-radius:3px;transition:width .5s;}
    .reset-iw{width:72px;height:72px;border-radius:50%;background:#1f1410;border:2px solid rgba(232,66,10,.2);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;}
    .reset-conf{width:100%;display:flex;align-items:center;gap:12px;border-radius:12px;padding:14px;cursor:pointer;border:none;min-height:52px;margin-bottom:14px;}
    .chkbox{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;}
    .rab{width:100%;height:52px;border-radius:14px;font-family:var(--fd);font-weight:700;font-size:16px;border:none;cursor:pointer;}
    .rab:active{opacity:.85;}
    .modal-bg{background:rgba(0,0,0,.72);display:flex;align-items:flex-end;min-height:260px;}
    .modal-sheet{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px 18px 28px;}
    .modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .modal-title{font-family:var(--fd);font-weight:700;font-size:16px;}
    .modal-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px;padding:4px 8px;line-height:1;}
    .modal-sum{background:#111214;border:1px solid var(--border);border-radius:10px;padding:12px;font-size:12px;color:var(--muted);margin-bottom:12px;}
    .msb{width:100%;height:50px;border-radius:12px;font-family:var(--fd);font-weight:700;font-size:15px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
    .msb:active{opacity:.85;}
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--text);}
    .field input{width:100%;background:#111214;border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:16px;color:var(--text);font-family:var(--fb);outline:none;}
    .field input::placeholder{color:var(--muted);}
    .pri-btn{width:100%;height:52px;background:var(--warn);color:#0e0e10;border:none;border-radius:12px;font-family:var(--fd);font-weight:700;font-size:16px;cursor:pointer;}
    .pri-btn:active{opacity:.85;}
    .sec-btn{width:100%;height:44px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:12px;font-family:var(--fb);font-size:14px;cursor:pointer;margin-top:8px;}
    .sec-btn:active{opacity:.7;}
    .tc{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;margin-bottom:10px;}
    .tc:active{opacity:.8;}
    .tc.tc-active{border-color:var(--warn);background:#1f1c0e;}
    .tc-info{flex:1;min-width:0;}
    .tc-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tc-sub{font-size:11px;color:var(--muted);margin-top:2px;}
    .tc-bal{font-family:var(--fd);font-weight:700;font-size:15px;flex-shrink:0;text-align:right;}
    .tc-bsub{font-size:10px;color:var(--muted);text-align:right;}
    .tc-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px;}
    .tc-del:active{color:var(--danger);}
    .badge{font-size:9px;background:var(--warn);color:#0e0e10;border-radius:10px;padding:2px 7px;font-weight:700;flex-shrink:0;}
    .scr{background:var(--canvas);padding-bottom:20px;min-height:100vh;}
    .scr-hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:16px clamp(12px,4vw,16px) 14px;padding-top:max(16px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;}
    .scr-title{font-family:var(--fd);font-weight:700;font-size:16px;}
    .scr-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px;padding:4px 8px;line-height:1;}
    .ob-banner{background:#2a1010;border:1px solid rgba(232,66,10,.4);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:12px;color:#E8420A;line-height:1.4;}
    /* toast */
    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#23252a;border:1px solid var(--border);color:var(--text);font-size:13px;padding:10px 18px;border-radius:20px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
    .toast.show{opacity:1;}
    /* sync indicator */
    .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-left:6px;flex-shrink:0;}
    .sync-dot.syncing{background:var(--warn);animation:pulse 1s infinite;}
    .sync-dot.error{background:var(--danger);}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
    /* loading screen */
    .loading-scr{position:fixed;inset:0;background:var(--canvas);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:1000;}
    .loading-scr .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--warn);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>

<!-- Loading -->
<div class="loading-scr" id="loadingScr">
  <div style="font-size:36px;">✈️</div>
  <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;">Trip Wallet</div>
  <div class="spinner"></div>
  <div style="font-size:12px;color:var(--muted);" id="loadingMsg">Conectando ao banco de dados…</div>
</div>

<div class="toast" id="toast"></div>

<div class="app" id="app" style="display:none;">

  <!-- TELA: LISTA DE VIAGENS -->
  <div class="scr" id="scrTrips" style="display:none;">
    <div class="scr-hdr">
      <div class="scr-title">✈️ Trip Wallet</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="sync-dot" id="syncDotTrips"></span>
        <button class="scr-close" onclick="closeTrips()">✕</button>
      </div>
    </div>
    <div style="padding:18px clamp(12px,4vw,16px) 0;">
      <div class="sec-lbl">Suas viagens</div>
      <div id="tripList"></div>
      <button class="pri-btn" onclick="showNewTrip()">+ Nova viagem</button>
    </div>
  </div>

  <!-- TELA: NOVA VIAGEM -->
  <div class="scr" id="scrNewTrip" style="display:none;">
    <div class="scr-hdr">
      <div class="scr-title">Nova viagem</div>
      <button class="scr-close" onclick="hideNewTrip()">✕</button>
    </div>
    <div style="padding:18px clamp(12px,4vw,16px) 0;">
      <div class="field"><label>Nome da viagem</label><input type="text" id="ntName" placeholder="Ex: Lisboa – Jun 2026"/></div>
      <div class="field"><label>Orçamento (US$)</label><input type="number" id="ntBudget" placeholder="Ex: 1500" inputmode="decimal"/></div>
      <div class="field"><label>Duração (dias)</label><input type="number" id="ntDays" placeholder="Ex: 10" inputmode="numeric"/></div>
      <button class="pri-btn" id="createTripBtn" onclick="createTrip()">Criar viagem</button>
      <button class="sec-btn" onclick="hideNewTrip()">Cancelar</button>
    </div>
  </div>

  <!-- APP PRINCIPAL -->
  <div id="mainApp" style="display:none;flex-direction:column;min-height:100vh;min-height:-webkit-fill-available;">
    <div class="hdr">
      <div class="logo-row">
        <span style="font-size:clamp(15px,4.5vw,18px);">✈️</span>
        <div>
          <div class="logo-txt">Trip Wallet</div>
          <div id="hdrSub" style="font-size:clamp(9px,2.3vw,10px);color:var(--muted);display:flex;align-items:center;">
            <span id="hdrSubName">—</span>
            <span class="sync-dot" id="syncDotMain" style="margin-left:5px;"></span>
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="sw" onclick="openTrips()">
          <span style="font-size:12px;">🗂️</span>
          <span class="sw-name" id="swName">Viagem</span>
          <span class="sw-chev">▼</span>
        </div>
        <div class="hb">
          <div class="hb-lbl">Disponível</div>
          <div class="hb-val" id="hdrBal">$0.00</div>
        </div>
      </div>
    </div>
    <div class="main" id="mainContent"></div>
    <nav class="nav">
      <button class="nb active" id="nb-home"     onclick="setTab('home')">    <span class="nb-icon">🏠</span><span class="nb-lbl">Início</span></button>
      <button class="nb"        id="nb-register" onclick="setTab('register')"><span class="nb-icon">➕</span><span class="nb-lbl">Adicionar</span></button>
      <button class="nb"        id="nb-history"  onclick="setTab('history')"> <span class="nb-icon">🕐</span><span class="nb-lbl">Histórico</span></button>
      <button class="nb"        id="nb-summary"  onclick="setTab('summary')"> <span class="nb-icon">📊</span><span class="nb-lbl">Resumo</span></button>
      <button class="nb"        id="nb-reset"    onclick="setTab('reset')">   <span class="nb-icon">🔄</span><span class="nb-lbl">Resetar</span></button>
    </nav>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// SUPABASE CONFIG
// ═══════════════════════════════════════════
const SB_URL = 'https://fuxhpzhbhdfakyjxdwhi.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1eGhwemhiaGRmYWt5anhkd2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNTc1ODUsImV4cCI6MjA5NjkzMzU4NX0.-D0uFPq44pIcx5Cfk2YaQbTOmm9Xnge0sxclBWc33Wk';

async function sbFetch(path, opts={}) {
  const res = await fetch(SB_URL + '/rest/v1/' + path, {
    ...opts,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...(opts.headers||{})
    }
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

// ═══════════════════════════════════════════
// DB LAYER — lê/escreve no Supabase
// ═══════════════════════════════════════════
const DB = {
  async loadTrips() {
    return await sbFetch('trips?select=*&order=created_at.asc');
  },
  async loadExpenses(tripId) {
    return await sbFetch(`expenses?trip_id=eq.${tripId}&select=*&order=ts.desc`);
  },
  async insertTrip(t) {
    const rows = await sbFetch('trips', {
      method: 'POST',
      body: JSON.stringify(t)
    });
    return rows[0];
  },
  async deleteTrip(id) {
    await sbFetch(`trips?id=eq.${id}`, {
      method: 'DELETE',
      prefer: 'return=minimal',
      headers: { 'Prefer': 'return=minimal' }
    });
  },
  async insertExpense(e) {
    const rows = await sbFetch('expenses', {
      method: 'POST',
      body: JSON.stringify(e)
    });
    return rows[0];
  },
  async deleteExpense(id) {
    await sbFetch(`expenses?id=eq.${id}`, {
      method: 'DELETE',
      prefer: 'return=minimal',
      headers: { 'Prefer': 'return=minimal' }
    });
  },
  async deleteAllExpenses(tripId) {
    await sbFetch(`expenses?trip_id=eq.${tripId}`, {
      method: 'DELETE',
      prefer: 'return=minimal',
      headers: { 'Prefer': 'return=minimal' }
    });
  }
};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let trips    = [];   // [{id, name, budget, days, created_at}]
let expenses = {};   // { tripId: [{id, trip_id, amount, category, note, ts}] }
let activeId = null;
let tab = 'home', rIn = '0', rCat = 'food', rNote = '', pdfOpen = false, rcOk = false;
let syncing = false;

// localStorage só para guardar qual viagem estava ativa
function savePref() { try { localStorage.setItem('tw_pref', JSON.stringify({activeId})); } catch(e){} }
function loadPref() { try { const p=JSON.parse(localStorage.getItem('tw_pref')||'{}'); activeId=p.activeId||null; } catch(e){} }

// ═══════════════════════════════════════════
// UTIL
// ═══════════════════════════════════════════
const CATS_UI=[
  {id:'food',label:'Alimentação',icon:'🍽️',color:'#FFD23F'},
  {id:'transport',label:'Transporte',icon:'🚗',color:'#3ecf8e'},
  {id:'lodging',label:'Hospedagem',icon:'🛏️',color:'#60a5fa'},
  {id:'shopping',label:'Compras',icon:'🛍️',color:'#f472b6'},
  {id:'coffee',label:'Café',icon:'☕',color:'#fb923c'},
  {id:'flights',label:'Voos',icon:'✈️',color:'#a78bfa'},
  {id:'leisure',label:'Lazer',icon:'🎟️',color:'#34d399'},
  {id:'other',label:'Outros',icon:'❓',color:'#9ca3af'},
];
const CATS_PDF={food:'#c67c00',transport:'#0a7a4a',lodging:'#1a5ca8',shopping:'#9c1a6e',coffee:'#b84e00',flights:'#5c2db8',leisure:'#0a7a5a',other:'#555'};
const gc  = id => CATS_UI.find(c=>c.id===id)||CATS_UI[CATS_UI.length-1];
const gcP = id => ({...gc(id), color:CATS_PDF[id]||'#555'});
const fmt = n => (n<0?'-':'')+'$'+Math.abs(n).toFixed(2);
function balColor(avail,budget){ if(avail<0)return'#E8420A'; if(avail/budget<0.20)return'#E8420A'; return'#FFD23F'; }
function gColor(pct){ return pct>=100?'#E8420A':pct>70?'#FFD23F':'#ffffff'; }
function fmtD(ts){
  const d=new Date(ts),n=new Date();
  if(d.toDateString()===n.toDateString())return'Hoje';
  if(d.toDateString()===new Date(n-86400000).toDateString())return'Ontem';
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
}
function grp(exps){
  const g={};
  [...exps].sort((a,b)=>b.ts-a.ts).forEach(e=>{const k=fmtD(e.ts);if(!g[k])g[k]=[];g[k].push(e);});
  return g;
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function showToast(msg, dur=2200){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}
function setSyncing(state){
  syncing=state;
  document.querySelectorAll('.sync-dot').forEach(d=>{
    d.className='sync-dot'+(state==='syncing'?' syncing':state==='error'?' error':'');
  });
}

function activeTrip(){ return trips.find(t=>t.id===activeId)||null; }
function activeExpenses(){ return expenses[activeId]||[]; }

// ═══════════════════════════════════════════
// INIT — carrega dados do Supabase
// ═══════════════════════════════════════════
async function init(){
  loadPref();
  try {
    document.getElementById('loadingMsg').textContent = 'Carregando viagens…';
    trips = await DB.loadTrips();

    // Se havia uma viagem ativa, carrega os gastos dela
    if(activeId && trips.find(t=>t.id===activeId)){
      document.getElementById('loadingMsg').textContent = 'Carregando gastos…';
      expenses[activeId] = await DB.loadExpenses(activeId);
    } else {
      activeId = trips.length ? trips[0].id : null;
      if(activeId){
        expenses[activeId] = await DB.loadExpenses(activeId);
      }
      savePref();
    }

    document.getElementById('loadingScr').style.display='none';
    document.getElementById('app').style.display='block';

    if(trips.length===0){
      document.getElementById('scrNewTrip').style.display='block';
    } else {
      showMain(); renderAll();
    }
  } catch(err){
    document.getElementById('loadingMsg').textContent = '❌ Erro ao conectar. Verifique a internet.';
    console.error(err);
  }
}

// ═══════════════════════════════════════════
// NAVEGAÇÃO DE TELAS
// ═══════════════════════════════════════════
function showMain(){
  ['scrTrips','scrNewTrip'].forEach(id=>document.getElementById(id).style.display='none');
  const m=document.getElementById('mainApp');m.style.display='flex';m.style.flexDirection='column';
}
async function openTrips(){
  document.getElementById('mainApp').style.display='none';
  document.getElementById('scrNewTrip').style.display='none';
  document.getElementById('scrTrips').style.display='block';
  renderTripList();
}
function closeTrips(){ if(activeTrip())showMain(); }
function showNewTrip(){
  document.getElementById('scrTrips').style.display='none';
  document.getElementById('scrNewTrip').style.display='block';
  ['ntName','ntBudget','ntDays'].forEach(id=>document.getElementById(id).value='');
}
function hideNewTrip(){
  if(trips.length===0) return; // não pode fechar sem ter viagem
  document.getElementById('scrNewTrip').style.display='none';
  document.getElementById('scrTrips').style.display='block';
  renderTripList();
}

async function setActive(id){
  activeId=id; savePref();
  rIn='0';rNote='';rCat='food';tab='home';pdfOpen=false;rcOk=false;
  // Carrega gastos se ainda não carregou
  if(!expenses[id]){
    setSyncing('syncing');
    try { expenses[id]=await DB.loadExpenses(id); setSyncing(''); }
    catch(e){ setSyncing('error'); showToast('⚠ Erro ao carregar gastos'); }
  }
  renderAll(); showMain();
}

// ═══════════════════════════════════════════
// TRIP CRUD
// ═══════════════════════════════════════════
async function createTrip(){
  const name=document.getElementById('ntName').value.trim();
  const budget=parseFloat(document.getElementById('ntBudget').value);
  const days=parseInt(document.getElementById('ntDays').value)||14;
  if(!name||isNaN(budget)||budget<=0){ showToast('⚠ Preencha nome e orçamento'); return; }

  const btn=document.getElementById('createTripBtn');
  btn.textContent='Salvando…'; btn.disabled=true;
  setSyncing('syncing');
  try {
    const now=Date.now();
    const t={ id:uid(), name, budget, days, created_at:now, updated_at:now };
    await DB.insertTrip(t);
    trips.push(t);
    expenses[t.id]=[];
    activeId=t.id; savePref();
    setSyncing('');
    showToast('✅ Viagem criada!');
    tab='home'; renderAll(); showMain();
  } catch(e){
    setSyncing('error');
    showToast('❌ Erro ao salvar viagem');
    console.error(e);
  } finally {
    btn.textContent='Criar viagem'; btn.disabled=false;
  }
}

async function deleteTrip(id,e){
  e.stopPropagation();
  if(trips.length===1){ showToast('É preciso ter ao menos uma viagem'); return; }
  if(!confirm('Apagar esta viagem e todos os gastos?')) return;
  setSyncing('syncing');
  try {
    await DB.deleteTrip(id); // cascade apaga expenses
    trips=trips.filter(t=>t.id!==id);
    delete expenses[id];
    if(activeId===id){ activeId=trips[0]?.id||null; savePref(); }
    setSyncing(''); renderTripList();
    if(!activeTrip()){ showMain(); renderAll(); }
  } catch(e){ setSyncing('error'); showToast('❌ Erro ao apagar viagem'); }
}

// ═══════════════════════════════════════════
// EXPENSE CRUD
// ═══════════════════════════════════════════
async function saveExp(){
  const amount=parseFloat(rIn); if(!amount||amount<=0) return;
  const note=document.getElementById('rnote')?.value.trim()||gc(rCat).label;
  const btn=document.getElementById('sbtn');
  btn.textContent='Salvando…'; btn.disabled=true;
  setSyncing('syncing');
  try {
    const exp={ id:uid(), trip_id:activeId, amount, category:rCat, note, ts:Date.now(), created_at:Date.now() };
    await DB.insertExpense(exp);
    if(!expenses[activeId]) expenses[activeId]=[];
    expenses[activeId].unshift(exp);
    rIn='0'; rNote=''; tab='home';
    setSyncing(''); showToast('✅ Gasto registrado!');
    renderAll();
  } catch(err){
    setSyncing('error'); showToast('❌ Erro ao salvar gasto');
    btn.textContent='Registrar'; btn.disabled=false;
  }
}

async function delExp(id){
  if(!confirm('Remover este gasto?')) return;
  setSyncing('syncing');
  try {
    await DB.deleteExpense(id);
    expenses[activeId]=expenses[activeId].filter(e=>e.id!==id);
    setSyncing(''); showToast('🗑 Gasto removido'); renderAll();
  } catch(e){ setSyncing('error'); showToast('❌ Erro ao remover'); }
}

async function doReset(){
  const t=activeTrip(); if(!t||!rcOk) return;
  setSyncing('syncing');
  try {
    await DB.deleteAllExpenses(activeId);
    expenses[activeId]=[];
    rcOk=false; tab='home';
    setSyncing(''); showToast('✅ Gastos apagados'); renderAll();
  } catch(e){ setSyncing('error'); showToast('❌ Erro ao resetar'); }
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function renderAll(){
  const t=activeTrip(); if(!t) return;
  const exps=activeExpenses();
  const spent=exps.reduce((a,e)=>a+parseFloat(e.amount),0);
  const avail=t.budget-spent;
  document.getElementById('hdrSubName').textContent=t.name;
  document.getElementById('swName').textContent=t.name;
  const hb=document.getElementById('hdrBal');
  hb.textContent=fmt(avail); hb.style.color=balColor(avail,t.budget);
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nb-'+tab); if(nb)nb.classList.add('active');
  renderTab(tab);
}
function setTab(t){ tab=t; renderAll(); }
function renderTab(t){
  const c=document.getElementById('mainContent'); if(!c) return;
  if(t==='home')c.innerHTML=rHome();
  else if(t==='register')c.innerHTML=rRegister();
  else if(t==='history')c.innerHTML=rHistory();
  else if(t==='summary')c.innerHTML=rSummary();
  else if(t==='reset')c.innerHTML=rReset();
}

function renderTripList(){
  const el=document.getElementById('tripList'); if(!el) return;
  el.innerHTML=trips.map(t=>{
    const exps=expenses[t.id]||[];
    const spent=exps.reduce((a,e)=>a+parseFloat(e.amount),0);
    const avail=t.budget-spent; const isA=t.id===activeId;
    return`<div class="tc${isA?' tc-active':''}" onclick="setActive('${t.id}')">
      <span style="font-size:22px;">✈️</span>
      <div class="tc-info"><div class="tc-name">${t.name}</div><div class="tc-sub">${exps.length} gasto${exps.length!==1?'s':''} · ${t.days} dias</div></div>
      <div><div class="tc-bal" style="color:${balColor(avail,t.budget)};">${fmt(avail)}</div><div class="tc-bsub">de $${parseFloat(t.budget).toFixed(2)}</div></div>
      ${isA?'<span class="badge">ATIVA</span>':''}
      ${trips.length>1?`<button class="tc-del" onclick="deleteTrip('${t.id}',event)">🗑️</button>`:''}
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
// KEYPAD
// ═══════════════════════════════════════════
function selCat(id){ rCat=id; renderTab('register'); }
function kp(k){
  if(k==='DEL'){ rIn=rIn.length<=1?'0':rIn.slice(0,-1); }
  else if(k==='.'){ if(!rIn.includes('.')) rIn+='.'; }
  else{ if(rIn==='0') rIn=k; else if(rIn.replace('.','').length<7) rIn+=k; }
  const n=document.getElementById('anum'); if(n) n.textContent=rIn;
  const b=document.getElementById('sbtn'); const cat=gc(rCat); const v=parseFloat(rIn)||0;
  if(b){ b.textContent='Registrar '+(v>0?'$'+v.toFixed(2):''); b.style.background=v>0?cat.color:'var(--border)'; b.style.opacity=v>0?1:0.4; b.disabled=v<=0; }
}

function openPdfModal(){ pdfOpen=true; renderTab('history'); }
function closePdf(){ pdfOpen=false; renderTab('history'); }
function toggleRC(){ rcOk=!rcOk; renderTab('reset'); }

function gerarPDF(){
  const t=activeTrip(); const exps=activeExpenses(); if(!t) return;
  const total=exps.reduce((a,e)=>a+parseFloat(e.amount),0);
  const avail=t.budget-total; const over=avail<0;
  const grouped=grp(exps);
  const catTotals=CATS_UI.map(c=>({...gcP(c.id),total:exps.filter(e=>e.category===c.id).reduce((a,e)=>a+parseFloat(e.amount),0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  const dateStr=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
  let rows='';
  Object.keys(grouped).forEach(dk=>{
    rows+=`<tr style="background:#f0f4f8;"><td colspan="3" style="padding:6px 10px;font-weight:700;font-size:12px;color:#333;border-bottom:1px solid #e0e0e0;">${dk}</td></tr>`;
    grouped[dk].forEach(e=>{
      const cat=gcP(e.category);
      const time=new Date(e.ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      rows+=`<tr><td style="padding:7px 10px;font-size:13px;">${cat.icon} ${e.note}</td><td style="padding:7px 10px;font-size:11px;color:#777;">${cat.label} · ${time}</td><td style="padding:7px 10px;font-size:13px;font-weight:600;text-align:right;color:#c00;">-$${parseFloat(e.amount).toFixed(2)}</td></tr>`;
    });
  });
  let catRows=catTotals.map(c=>{const pct=total>0?((c.total/total)*100).toFixed(1):0;return`<tr><td style="padding:6px 10px;font-size:12px;">${c.icon} ${c.label}</td><td style="padding:6px 10px;font-size:13px;font-weight:700;text-align:right;color:${c.color};">$${c.total.toFixed(2)}</td><td style="padding:6px 10px;font-size:11px;color:#888;text-align:right;">${pct}%</td></tr>`;}).join('');
  const html=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Trip Wallet – ${t.name}</title>
  <style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:Arial,sans-serif;background:#fff;color:#111;padding:32px;}h1{font-size:22px;font-weight:700;margin-bottom:3px;}.sub{font-size:13px;color:#888;margin-bottom:24px;}.cards{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap;}.card{flex:1;min-width:100px;border:1px solid #ddd;border-radius:8px;padding:14px;}.card-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:4px;}.card-val{font-size:20px;font-weight:700;}table{width:100%;border-collapse:collapse;margin-bottom:28px;}th{text-align:left;font-size:10px;text-transform:uppercase;color:#999;padding:7px 10px;border-bottom:2px solid #eee;}tr:nth-child(even) td{background:#fafafa;}.footer{font-size:11px;color:#bbb;text-align:center;border-top:1px solid #eee;padding-top:12px;}@media print{body{padding:16px;}@page{margin:1cm;size:A4;}}</style>
  </head><body>
  <h1>✈️ Trip Wallet</h1><div class="sub">${t.name} · Relatório gerado em ${dateStr}</div>
  <div class="cards">
    <div class="card"><div class="card-lbl">Orçamento</div><div class="card-val">$${parseFloat(t.budget).toFixed(2)}</div></div>
    <div class="card"><div class="card-lbl">Total gasto</div><div class="card-val" style="color:#c00;">$${total.toFixed(2)}</div></div>
    <div class="card"><div class="card-lbl">Saldo restante</div><div class="card-val" style="color:${over?'#c00':'#0a7a4a'};">${fmt(avail)}</div></div>
  </div>
  <table><thead><tr><th>Descrição</th><th>Categoria · Hora</th><th style="text-align:right;">Valor</th></tr></thead>
  <tbody>${rows||'<tr><td colspan="3" style="padding:20px;text-align:center;color:#aaa;">Nenhum gasto registrado</td></tr>'}</tbody></table>
  ${catTotals.length?`<table><thead><tr><th>Categoria</th><th style="text-align:right;">Total</th><th style="text-align:right;">% do gasto</th></tr></thead><tbody>${catRows}</tbody></table>`:''}
  <div class="footer">Trip Wallet · ${exps.length} lançamento${exps.length!==1?'s':''} · ${t.days} dias de viagem</div>
  </body></html>`;
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const win=window.open(url,'_blank');
  if(win){ setTimeout(()=>win.print(),700); } else { showToast('⚠ Permita pop-ups para gerar o PDF'); }
  closePdf();
}

  window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}

// START
init();
</script>
</body>
</html>
